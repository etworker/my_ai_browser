<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOA - 视觉化操作助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg: #f5f5f7;
            --surface: white;
            --border: #ddd;
            --text: #333;
            --text-secondary: #666;
        }
        
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
        }
        
        #app {
            display: flex;
            height: 100vh;
        }
        
        /* 左侧浏览器区域 */
        #browser-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        /* 标签栏 */
        #tab-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            background: #2d2d2d;
        }
        
        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #444;
            color: #ccc;
            border-radius: 4px 4px 0 0;
            font-size: 12px;
            max-width: 180px;
            cursor: pointer;
        }
        
        .tab:hover {
            background: #555;
        }
        
        .tab.active {
            background: var(--bg);
            color: var(--text);
        }
        
        .tab .close {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: inherit;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            opacity: 0.6;
        }
        
        .tab .close:hover {
            background: rgba(255,255,255,0.2);
            opacity: 1;
        }
        
        #new-tab-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
        }
        
        #new-tab-btn:hover {
            background: #444;
            color: #fff;
        }
        
        /* 地址栏 */
        #url-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: #2d2d2d;
            border-top: 1px solid #444;
        }
        
        #nav-buttons {
            display: flex;
            gap: 4px;
        }
        
        #nav-buttons button {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: #444;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        
        #nav-buttons button:hover {
            background: #555;
        }
        
        #nav-buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #url-bar {
            flex: 1;
            padding: 6px 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        
        #url-bar:focus {
            border-color: var(--primary);
        }
        
        #go-btn {
            padding: 6px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        #go-btn:hover {
            opacity: 0.9;
        }
        
        /* Webview 容器 */
        #webview-container {
            flex: 1;
            position: relative;
            background: white;
        }
        
        #webview {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #auto-capture-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            z-index: 100;
            display: none;
        }
        
        #auto-capture-panel.show {
            display: block;
        }
        
        #auto-capture-panel .title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }
        
        #auto-capture-panel .info {
            color: #aaa;
            margin-bottom: 4px;
        }
        
        #auto-capture-panel .action {
            color: #22c55e;
            font-weight: 500;
        }
        
        /* 右侧对话面板 */
        #chat-section {
            width: 380px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
        }
        
        #chat-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        #chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        #chat-header .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        
        #chat-status {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        
        #chat-status .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        #chat-status .label {
            color: var(--text-secondary);
        }
        
        #chat-status .value {
            font-weight: 500;
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .chat-welcome {
            color: var(--text-secondary);
        }
        
        .chat-welcome p {
            margin-bottom: 8px;
        }
        
        .chat-welcome ul {
            margin-left: 20px;
            margin-top: 8px;
        }
        
        .chat-message {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
        }
        
        .chat-message.user {
            background: #e8f0fe;
            margin-left: 30px;
        }
        
        .chat-message.assistant {
            background: var(--bg);
            margin-right: 30px;
        }
        
        .chat-message .role {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .chat-message .content {
            color: var(--text);
        }
        
        #input-area {
            padding: 12px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        
        #user-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            margin-bottom: 8px;
        }
        
        #user-input:focus {
            border-color: var(--primary);
        }
        
        #input-actions {
            display: flex;
            gap: 8px;
        }
        
        #send-btn {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        #send-btn:hover {
            opacity: 0.9;
        }
        
        #auto-mode-btn {
            padding: 10px 16px;
            background: var(--surface);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        #auto-mode-btn.active {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 左侧浏览器区域 -->
        <div id="browser-section">
            <div id="tab-bar">
                <div class="tab active" data-tab="0">
                    <span class="tab-title">新标签</span>
                    <button class="close" data-tab="0">&times;</button>
                </div>
                <button id="new-tab-btn">+</button>
            </div>
            <div id="url-bar-container">
                <div id="nav-buttons">
                    <button id="back-btn" title="后退" disabled>&#8592;</button>
                    <button id="forward-btn" title="前进" disabled>&#8594;</button>
                    <button id="refresh-btn" title="刷新">&#8635;</button>
                </div>
                <input type="text" id="url-bar" placeholder="输入网址..." />
                <button id="go-btn">前往</button>
            </div>
            <div id="webview-container">
                <webview id="webview" src="https://www.google.com"></webview>
                <div id="auto-capture-panel">
                    <div class="title">VOA 智能分析中</div>
                    <div class="info" id="panel-url">URL: -</div>
                    <div class="info" id="panel-dom">DOM元素: -</div>
                    <div class="action" id="panel-action">等待分析...</div>
                </div>
            </div>
        </div>
        
        <!-- 右侧对话面板 -->
        <div id="chat-section">
            <div id="chat-header">
                <h1>VOA</h1>
                <div class="subtitle">视觉化操作助手</div>
            </div>
            <div id="chat-status">
                <div class="status-item">
                    <span class="label">状态:</span>
                    <span id="status" class="value">就绪</span>
                </div>
                <div class="status-item">
                    <span class="label">标签:</span>
                    <span id="tab-count" class="value">1</span>
                </div>
            </div>
            <div id="chat-container">
                <div class="chat-welcome">
                    <p>您好！我是 VOA，您的视觉化操作助手。</p>
                    <p>请告诉我您想完成什么操作，比如：</p>
                    <ul>
                        <li>"我想在 AWS 上启动一台 EC2"</li>
                        <li>"帮我创建一个 GitHub 仓库"</li>
                        <li>"在 Azure 上创建存储账户"</li>
                    </ul>
                </div>
            </div>
            <div id="input-area">
                <textarea id="user-input" placeholder="描述您想完成的操作..." rows="2"></textarea>
                <div id="input-actions">
                    <button id="send-btn">发送</button>
                    <button id="auto-mode-btn">自动模式</button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;
        
        const webview = document.getElementById('webview');
        const urlBar = document.getElementById('url-bar');
        const goBtn = document.getElementById('go-btn');
        const backBtn = document.getElementById('back-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const autoCapturePanel = document.getElementById('auto-capture-panel');
        const panelUrl = document.getElementById('panel-url');
        const panelDom = document.getElementById('panel-dom');
        const panelAction = document.getElementById('panel-action');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const autoModeBtn = document.getElementById('auto-mode-btn');
        const statusEl = document.getElementById('status');
        
        let autoMode = false;
        let lastUrl = '';
        let isProcessing = false;
        let tabCounter = 1;
        const tabs = [{ id: 0, title: '新标签', url: 'https://www.google.com' }];
        
        // 导航功能
        function navigateTo(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            webview.src = url;
        }
        
        goBtn.addEventListener('click', () => navigateTo(urlBar.value));
        urlBar.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigateTo(urlBar.value);
        });
        
        backBtn.addEventListener('click', () => webview.goBack());
        forwardBtn.addEventListener('click', () => webview.goForward());
        refreshBtn.addEventListener('click', () => {
            webview.reload();
            if (autoMode) setTimeout(captureAndAnalyze, 2000);
        });
        
        webview.addEventListener('did-navigate', (e) => {
            urlBar.value = e.payload.url;
            tabs[0].url = e.payload.url;
            backBtn.disabled = !webview.canGoBack();
            forwardBtn.disabled = !webview.canGoForward();
            if (autoMode && e.payload.url !== lastUrl) {
                lastUrl = e.payload.url;
                setTimeout(captureAndAnalyze, 1500);
            }
        });
        
        webview.addEventListener('did-navigate-in-page', (e) => {
            if (autoMode && e.payload.url !== lastUrl) {
                lastUrl = e.payload.url;
                setTimeout(captureAndAnalyze, 1000);
            }
        });
        
        // 对话功能
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        
        autoModeBtn.addEventListener('click', () => {
            autoMode = !autoMode;
            autoModeBtn.classList.toggle('active', autoMode);
            autoModeBtn.textContent = autoMode ? '停止自动' : '自动模式';
            addChatMessage('assistant', autoMode ? '🚀 自动模式已开启' : '自动模式已关闭');
            if (autoMode) captureAndAnalyze();
        });
        
        function handleSend() {
            const input = userInput.value.trim();
            if (!input) return;
            addChatMessage('user', input);
            userInput.value = '';
            processInput(input);
        }
        
        function processInput(input) {
            const lower = input.toLowerCase();
            if (lower.includes('打开') || lower.includes('浏览器')) {
                addChatMessage('assistant', '浏览器已在左侧打开，请告诉我您的目标');
            } else if (lower.includes('继续') || lower.includes('下一步')) {
                if (autoMode) analyzeAndAct();
                else addChatMessage('assistant', '请先开启自动模式');
            } else if (lower.includes('停止') || lower.includes('退出')) {
                autoMode = false;
                autoModeBtn.classList.remove('active');
                autoModeBtn.textContent = '自动模式';
                addChatMessage('assistant', '已退出自动模式');
            } else {
                addChatMessage('assistant', `好的，您的目标是: "${input}"\n\n请开启自动模式，我将帮您完成这个任务。`);
            }
        }
        
        function addChatMessage(role, content) {
            const welcome = chatContainer.querySelector('.chat-welcome');
            if (welcome) welcome.remove();
            const msg = document.createElement('div');
            msg.className = `chat-message ${role}`;
            msg.innerHTML = `<div class="role">${role === 'user' ? '您' : 'VOA'}</div><div class="content">${content.replace(/\n/g, '<br>')}</div>`;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // AI 分析功能
        async function captureAndAnalyze() {
            if (isProcessing) return;
            isProcessing = true;
            autoCapturePanel.classList.add('show');
            panelAction.textContent = '正在获取页面信息...';
            try {
                panelUrl.textContent = 'URL: ' + webview.src;
                const result = await webview.executeJavaScript(`
                    (function() {
                        const interactive = [];
                        function findInteractive(el) {
                            if (!el || !el.tagName) return;
                            const tag = el.tagName.toLowerCase();
                            const isInteractive = tag === 'button' || tag === 'a' || tag === 'input' || 
                                                tag === 'select' || tag === 'textarea' ||
                                                el.getAttribute('role') === 'button' ||
                                                el.className?.includes('btn') || el.className?.includes('button') ||
                                                el.onclick;
                            if (isInteractive && el.getBoundingClientRect().width > 5 && el.offsetParent !== null) {
                                const text = (el.innerText || el.value || el.placeholder || el.alt || '').trim().slice(0, 80);
                                if (text || tag === 'button' || tag === 'a' || tag === 'input') {
                                    const rect = el.getBoundingClientRect();
                                    let selector = '';
                                    if (el.id) selector = '#' + el.id;
                                    else if (el.className && typeof el.className === 'string' && el.className.split(' ')[0]) {
                                        selector = el.tagName.toLowerCase() + '.' + el.className.split(' ')[0];
                                    } else {
                                        selector = el.tagName.toLowerCase();
                                    }
                                    interactive.push({
                                        tag, text,
                                        rect: { x: Math.round(rect.x), y: Math.round(rect.y), 
                                               width: Math.round(rect.width), height: Math.round(rect.height) },
                                        selector,
                                        href: tag === 'a' ? el.href : null,
                                        type: tag === 'input' ? el.type : null,
                                        placeholder: el.placeholder || null
                                    });
                                }
                            }
                            for (const child of el.children || []) findInteractive(child);
                        }
                        findInteractive(document.body);
                        return JSON.stringify({
                            title: document.title,
                            url: window.location.href,
                            elements: interactive.slice(0, 60)
                        });
                    })()
                `);
                const data = JSON.parse(result);
                panelDom.textContent = 'DOM元素: ' + data.elements.length + '个';
                panelAction.textContent = '分析完成';
                addChatMessage('assistant', `页面分析: ${data.title}\n元素数: ${data.elements.length}`);
            } catch (e) {
                console.error('分析失败:', e);
                panelAction.textContent = '分析失败';
                setTimeout(() => autoCapturePanel.classList.remove('show'), 2000);
            }
            isProcessing = false;
        }
        
        async function analyzeAndAct() {
            addChatMessage('assistant', '正在分析页面...');
            // AI 决策逻辑待实现
        }
        
        // 监听 Rust 事件
        listen('set_auto_mode', (event) => {
            autoMode = event.payload.enabled;
            autoModeBtn.classList.toggle('active', autoMode);
            autoModeBtn.textContent = autoMode ? '停止自动' : '自动模式';
            if (autoMode) captureAndAnalyze();
        });
        
        listen('navigate_action', (event) => {
            navigateTo(event.payload.url);
        });
        
        listen('click_action', (event) => {
            const selector = event.payload.selector;
            webview.executeJavaScript(`
                (function() {
                    const el = document.querySelector('${selector}');
                    if (el) { el.click(); return { success: true }; }
                    return { success: false };
                })()
            `);
        });
        
        // 初始化
        setTimeout(() => {
            statusEl.textContent = '就绪';
            urlBar.value = webview.src;
        }, 1000);
    </script>
</body>
</html>
