<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOA - 视觉化操作助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg: #f5f5f7;
            --surface: white;
            --border: #ddd;
            --text: #333;
            --text-secondary: #666;
        }
        
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
        }
        
        #app {
            display: flex;
            height: 100vh;
        }
        
        /* 左侧浏览器区域 */
        #browser-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        
        /* 标签栏 */
        #tab-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 8px;
            background: #2d2d2d;
        }
        
        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #444;
            color: #ccc;
            border-radius: 4px 4px 0 0;
            font-size: 12px;
            max-width: 180px;
            cursor: pointer;
        }
        
        .tab.active {
            background: var(--bg);
            color: var(--text);
        }
        
        #new-tab-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
        }
        
        #new-tab-btn:hover {
            background: #444;
            color: #fff;
        }
        
        /* 地址栏 */
        #url-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: #2d2d2d;
            border-top: 1px solid #444;
        }
        
        #nav-buttons {
            display: flex;
            gap: 4px;
        }
        
        #nav-buttons button {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: #444;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        
        #nav-buttons button:hover {
            background: #555;
        }
        
        #url-bar {
            flex: 1;
            padding: 6px 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        
        #go-btn {
            padding: 6px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        /* Webview 容器 */
        #browser-container {
            flex: 1;
            position: relative;
            background: white;
            overflow: hidden;
        }
        
        /* 右侧对话面板 */
        #chat-section {
            width: 380px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
        }
        
        #chat-header {
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        #chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        #chat-header .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        
        #chat-status {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        
        #chat-status .label {
            color: var(--text-secondary);
        }
        
        #chat-status .value {
            font-weight: 500;
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            max-height: 300px;
        }
        
        /* 日志面板 */
        #log-panel {
            height: 150px;
            border-top: 1px solid var(--border);
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 11px;
            overflow-y: auto;
            padding: 8px;
        }
        
        #log-panel .log-entry {
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        #log-panel .log-entry.error {
            color: #f48771;
        }
        
        #log-panel .log-entry.info {
            color: #4fc1ff;
        }
        
        #log-panel .log-entry.success {
            color: #89d185;
        }
        
        .chat-welcome {
            color: var(--text-secondary);
        }
        
        .chat-welcome p {
            margin-bottom: 8px;
        }
        
        .chat-welcome ul {
            margin-left: 20px;
            margin-top: 8px;
        }
        
        .chat-message {
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
        }
        
        .chat-message.user {
            background: #e8f0fe;
            margin-left: 30px;
        }
        
        .chat-message.assistant {
            background: var(--bg);
            margin-right: 30px;
        }
        
        .chat-message .role {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        #input-area {
            padding: 12px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        
        #user-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            margin-bottom: 8px;
        }
        
        #input-actions {
            display: flex;
            gap: 8px;
        }
        
        #send-btn {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        #auto-mode-btn {
            padding: 10px 16px;
            background: var(--surface);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        #auto-mode-btn.active {
            background: var(--primary);
            color: white;
        }
        
        #clear-log-btn {
            padding: 4px 8px;
            background: transparent;
            color: #888;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
        }
        
        .log-header {
            padding: 4px 8px;
            background: #252526;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .log-header span {
            color: #888;
            font-size: 11px;
        }
        
        #browser-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 左侧浏览器区域 -->
        <div id="browser-section">
            <div id="tab-bar">
                <div class="tab active">
                    <span class="tab-title">新标签</span>
                </div>
                <button id="new-tab-btn">+</button>
            </div>
            <div id="url-bar-container">
                <div id="nav-buttons">
                    <button id="back-btn" title="后退">&#8592;</button>
                    <button id="forward-btn" title="前进">&#8594;</button>
                    <button id="refresh-btn" title="刷新">&#8635;</button>
                </div>
                <input type="text" id="url-bar" placeholder="输入网址..." />
                <button id="go-btn">前往</button>
            </div>
            <div id="browser-container">
                <div id="browser-loading">点击上方地址栏输入网址开始浏览</div>
            </div>
        </div>
        
        <!-- 右侧对话面板 -->
        <div id="chat-section">
            <div id="chat-header">
                <h1>VOA</h1>
                <div class="subtitle">视觉化操作助手</div>
            </div>
            <div id="chat-status">
                <div class="status-item">
                    <span class="label">状态:</span>
                    <span id="status" class="value">就绪</span>
                </div>
            </div>
            <div id="chat-container">
                <div class="chat-welcome">
                    <p>您好！我是 VOA，您的视觉化操作助手。</p>
                    <p>请告诉我您想完成什么操作，比如：</p>
                    <ul>
                        <li>"我想在 AWS 上启动一台 EC2"</li>
                        <li>"帮我创建一个 GitHub 仓库"</li>
                        <li>"在 Azure 上创建存储账户"</li>
                    </ul>
                </div>
            </div>
            <div class="log-header">
                <span>日志</span>
                <button id="clear-log-btn">清除</button>
            </div>
            <div id="log-panel"></div>
            <div id="input-area">
                <textarea id="user-input" placeholder="描述您想完成的操作..." rows="2"></textarea>
                <div id="input-actions">
                    <button id="send-btn">发送</button>
                    <button id="auto-mode-btn">自动模式</button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module">
        const { invoke } = window.__TAURI__.core;
        const { listen } = window.__TAURI__.event;
        
        const urlBar = document.getElementById('url-bar');
        const goBtn = document.getElementById('go-btn');
        const backBtn = document.getElementById('back-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const browserContainer = document.getElementById('browser-container');
        const logPanel = document.getElementById('log-panel');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const autoModeBtn = document.getElementById('auto-mode-btn');
        const statusEl = document.getElementById('status');
        const clearLogBtn = document.getElementById('clear-log-btn');
        
        let currentWebview = null;
        let autoMode = false;
        
        // 日志函数
        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }
        
        log('VOA 初始化完成', 'success');
        
        // 创建 webview
        async function createWebview(url) {
            log(`创建 WebView: ${url}`);
            
            // 移除现有的 webview
            if (currentWebview) {
                currentWebview.remove();
                currentWebview = null;
            }
            
            // 移除 loading 提示
            const loading = browserContainer.querySelector('#browser-loading');
            if (loading) loading.remove();
            
            // 创建新的 webview 元素
            const webview = document.createElement('webview');
            webview.id = 'main-webview';
            webview.src = url;
            webview.style.cssText = 'width: 100%; height: 100%; border: none;';
            
            // 监听事件
            webview.addEventListener('page-title-updated', (e) => {
                log(`标题: ${e.payload}`);
            });
            
            webview.addEventListener('did-start-loading', () => {
                log('开始加载...');
            });
            
            webview.addEventListener('did-finish-load', () => {
                log(`加载完成: ${webview.src}`, 'success');
                urlBar.value = webview.src;
            });
            
            webview.addEventListener('did-fail-load', (e) => {
                log(`加载失败: ${e.payload.errorCode} - ${e.payload.errorDescription}`, 'error');
            });
            
            webview.addEventListener('did-navigate', (e) => {
                log(`导航: ${e.payload.url}`);
                urlBar.value = e.payload.url;
            });
            
            browserContainer.appendChild(webview);
            currentWebview = webview;
            
            log('WebView 已创建', 'success');
        }
        
        // 导航功能
        function navigateTo(url) {
            if (!url) return;
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            log(`导航: ${url}`);
            
            if (currentWebview) {
                log('使用现有 WebView 导航');
                currentWebview.src = url;
            } else {
                log('创建新 WebView');
                createWebview(url);
            }
        }
        
        goBtn.addEventListener('click', () => {
            log(`点击前往, URL: ${urlBar.value}`);
            navigateTo(urlBar.value);
        });
        
        urlBar.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                log(`回车导航, URL: ${urlBar.value}`);
                navigateTo(urlBar.value);
            }
        });
        
        backBtn.addEventListener('click', () => {
            log('后退');
            if (currentWebview) {
                try {
                    currentWebview.goBack();
                } catch (e) {
                    log(`后退失败: ${e.message}`, 'error');
                }
            } else {
                log('无浏览历史', 'error');
            }
        });
        
        forwardBtn.addEventListener('click', () => {
            log('前进');
            if (currentWebview) {
                try {
                    currentWebview.goForward();
                } catch (e) {
                    log(`前进失败: ${e.message}`, 'error');
                }
            } else {
                log('无浏览历史', 'error');
            }
        });
        
        refreshBtn.addEventListener('click', () => {
            log('刷新');
            if (currentWebview) {
                try {
                    currentWebview.reload();
                } catch (e) {
                    log(`刷新失败: ${e.message}`, 'error');
                }
            }
        });
        
        // 对话功能
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
        
        autoModeBtn.addEventListener('click', () => {
            autoMode = !autoMode;
            autoModeBtn.classList.toggle('active', autoMode);
            autoModeBtn.textContent = autoMode ? '停止自动' : '自动模式';
            addChatMessage('assistant', autoMode ? '自动模式已开启' : '自动模式已关闭');
            log(`自动模式: ${autoMode ? '开启' : '关闭'}`, 'success');
        });
        
        clearLogBtn.addEventListener('click', () => {
            logPanel.innerHTML = '';
            log('日志已清除');
        });
        
        function handleSend() {
            const input = userInput.value.trim();
            if (!input) return;
            addChatMessage('user', input);
            userInput.value = '';
            processInput(input);
        }
        
        function processInput(input) {
            const lower = input.toLowerCase();
            if (lower.includes('打开') || lower.includes('浏览器')) {
                addChatMessage('assistant', '浏览器已在左侧打开，请告诉我您的目标');
            } else {
                addChatMessage('assistant', `好的，您的目标是: "${input}"\n\n请开启自动模式，我将帮您完成这个任务。`);
            }
        }
        
        function addChatMessage(role, content) {
            const welcome = chatContainer.querySelector('.chat-welcome');
            if (welcome) welcome.remove();
            const msg = document.createElement('div');
            msg.className = `chat-message ${role}`;
            msg.innerHTML = `<div class="role">${role === 'user' ? '您' : 'VOA'}</div><div class="content">${content.replace(/\n/g, '<br>')}</div>`;
            chatContainer.appendChild(msg);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 初始化
        setTimeout(() => {
            statusEl.textContent = '就绪';
            log('请点击地址栏输入网址开始浏览');
        }, 1000);
    </script>
</body>
</html>
