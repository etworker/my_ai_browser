<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOA Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: transparent;
            overflow: hidden;
            pointer-events: none;
        }
        
        #overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }
        
        #highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.15);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        #highlight-layer.active {
            opacity: 1;
        }
        
        #target-cutout {
            position: absolute;
            border: 3px dashed #ff4444;
            border-radius: 4px;
            box-shadow: 0 0 0 9999px rgba(255, 0, 0, 0.15);
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0%, 100% { border-color: #ff4444; opacity: 1; }
            50% { border-color: #ff8888; opacity: 0.7; }
        }
        
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 250px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        
        #tooltip.active {
            opacity: 1;
        }
        
        #tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 20px;
            border: 6px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.85);
        }
    </style>
</head>
<body>
    <div id="overlay-container">
        <div id="highlight-layer"></div>
        <div id="target-cutout"></div>
        <div id="tooltip"></div>
    </div>
    
    <script type="module">
        const { listen } = window.__TAURI__.event;
        const highlightLayer = document.getElementById('highlight-layer');
        const targetCutout = document.getElementById('target-cutout');
        const tooltip = document.getElementById('tooltip');
        
        let currentRegion = null;
        
        function updateHighlight(region, hint) {
            currentRegion = region;
            
            highlightLayer.classList.add('active');
            targetCutout.style.left = `${region.x}px`;
            targetCutout.style.top = `${region.y}px`;
            targetCutout.style.width = `${region.width}px`;
            targetCutout.style.height = `${region.height}px`;
            targetCutout.style.display = 'block';
            
            tooltip.textContent = hint;
            tooltip.style.left = `${region.x}px`;
            tooltip.style.top = `${region.y + region.height + 10}px`;
            tooltip.classList.add('active');
        }
        
        function hideHighlight() {
            highlightLayer.classList.remove('active');
            targetCutout.style.display = 'none';
            tooltip.classList.remove('active');
            currentRegion = null;
        }
        
        listen('show-highlight', (event) => {
            const { region, hint } = event.payload;
            updateHighlight(region, hint);
        });
        
        listen('hide-highlight', () => {
            hideHighlight();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideHighlight();
            }
        });
    </script>
</body>
</html>
