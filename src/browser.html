<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VOA Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #browser-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
        }
        
        #browser-toolbar button {
            padding: 6px 12px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        #browser-toolbar button:hover {
            background: #555;
        }
        
        #browser-toolbar button.active {
            background: #667eea;
        }
        
        #url-bar {
            flex: 1;
            padding: 6px 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 13px;
        }
        
        #url-bar:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #status-indicator {
            padding: 4px 8px;
            background: #333;
            color: #888;
            border-radius: 4px;
            font-size: 11px;
        }
        
        #status-indicator.connected {
            background: #22c55e;
            color: white;
        }
        
        #webview-container {
            flex: 1;
            position: relative;
            background: white;
        }
        
        #webview {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        #auto-capture-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            z-index: 100;
            display: none;
        }
        
        #auto-capture-panel.show {
            display: block;
        }
        
        #auto-capture-panel .title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #667eea;
        }
        
        #auto-capture-panel .info {
            color: #aaa;
            margin-bottom: 4px;
        }
        
        #auto-capture-panel .action {
            color: #22c55e;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="browser-toolbar">
        <button id="back-btn" title="后退">←</button>
        <button id="forward-btn" title="前进">→</button>
        <button id="refresh-btn" title="刷新">⟳</button>
        <input type="text" id="url-bar" placeholder="输入网址..." />
        <button id="go-btn">前往</button>
        <span id="status-indicator">未连接</span>
    </div>
    <div id="webview-container">
        <webview id="webview" src="https://www.google.com"></webview>
        <div id="auto-capture-panel">
            <div class="title">VOA 智能分析中</div>
            <div class="info" id="panel-url">URL: -</div>
            <div class="info" id="panel-dom">DOM元素: -</div>
            <div class="action" id="panel-action">等待分析...</div>
        </div>
    </div>
    
    <script type="module">
        const { invoke } = window.__TAURI__.core;
        const { listen, emit } = window.__TAURI__.event;
        const webview = document.getElementById('webview');
        const urlBar = document.getElementById('url-bar');
        const statusIndicator = document.getElementById('status-indicator');
        const autoCapturePanel = document.getElementById('auto-capture-panel');
        const panelUrl = document.getElementById('panel-url');
        const panelDom = document.getElementById('panel-dom');
        const panelAction = document.getElementById('panel-action');
        
        let autoMode = false;
        let lastUrl = '';
        let lastTitle = '';
        let isProcessing = false;
        
        async function captureAndAnalyze() {
            if (isProcessing) return;
            isProcessing = true;
            
            autoCapturePanel.classList.add('show');
            panelAction.textContent = '正在获取页面信息...';
            
            try {
                panelUrl.textContent = 'URL: ' + webview.src;
                
                const result = await webview.executeJavaScript(`
                    (function() {
                        const interactive = [];
                        
                        function findInteractive(el) {
                            if (!el || !el.tagName) return;
                            
                            const tag = el.tagName.toLowerCase();
                            const isInteractive = tag === 'button' || tag === 'a' || tag === 'input' || 
                                                tag === 'select' || tag === 'textarea' ||
                                                el.getAttribute('role') === 'button' ||
                                                el.className?.includes('btn') || el.className?.includes('button') ||
                                                el.onclick;
                            
                            if (isInteractive && el.getBoundingClientRect().width > 5 && el.offsetParent !== null) {
                                const text = (el.innerText || el.value || el.placeholder || el.alt || '').trim().slice(0, 80);
                                if (text || tag === 'button' || tag === 'a' || tag === 'input') {
                                    const rect = el.getBoundingClientRect();
                                    let selector = '';
                                    if (el.id) selector = '#' + el.id;
                                    else if (el.className && typeof el.className === 'string' && el.className.split(' ')[0]) {
                                        selector = el.tagName.toLowerCase() + '.' + el.className.split(' ')[0];
                                    } else {
                                        selector = el.tagName.toLowerCase();
                                    }
                                    
                                    interactive.push({
                                        tag,
                                        text,
                                        rect: { x: Math.round(rect.x), y: Math.round(rect.y), 
                                               width: Math.round(rect.width), height: Math.round(rect.height) },
                                        selector,
                                        href: tag === 'a' ? el.href : null,
                                        type: tag === 'input' ? el.type : null,
                                        placeholder: el.placeholder || null
                                    });
                                }
                            }
                            
                            for (const child of el.children || []) {
                                findInteractive(child);
                            }
                        }
                        
                        findInteractive(document.body);
                        
                        return JSON.stringify({
                            title: document.title,
                            url: window.location.href,
                            elements: interactive.slice(0, 60),
                            html: document.body.innerHTML.slice(0, 5000)
                        });
                    })()
                `);
                
                const data = JSON.parse(result);
                panelDom.textContent = 'DOM元素: ' + data.elements.length + '个';
                
                panelAction.textContent = '正在分析页面...';
                
                await invoke('analyze_page', {
                    pageData: JSON.stringify({
                        title: data.title,
                        url: data.url,
                        elements: data.elements,
                        html: data.html
                    })
                });
                
            } catch (e) {
                console.error('分析失败:', e);
                panelAction.textContent = '分析失败: ' + e.message;
                setTimeout(() => {
                    autoCapturePanel.classList.remove('show');
                }, 2000);
            }
            
            isProcessing = false;
        }
        
        listen('set_auto_mode', (event) => {
            autoMode = event.payload.enabled;
            statusIndicator.textContent = autoMode ? '自动模式' : '手动模式';
            statusIndicator.classList.toggle('connected', autoMode);
            
            if (autoMode) {
                captureAndAnalyze();
            } else {
                autoCapturePanel.classList.remove('show');
            }
        });
        
        listen('highlight_action', (event) => {
            const { selector, hint } = event.payload;
            highlightElement(selector, hint);
            panelAction.textContent = hint;
        });
        
        listen('click_action', (event) => {
            const { selector } = event.payload;
            clickElement(selector);
        });
        
        listen('navigate_action', (event) => {
            const { url } = event.payload;
            webview.src = url;
        });
        
        function highlightElement(selector, hint) {
            webview.executeJavaScript(`
                (function() {
                    const el = document.querySelector('${selector}');
                    if (el) {
                        el.style.boxShadow = '0 0 0 4px #667eea, 0 0 30px rgba(102, 126, 234, 0.5)';
                        el.style.transition = 'box-shadow 0.3s ease';
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        setTimeout(() => {
                            el.style.boxShadow = '';
                        }, 8000);
                        
                        return { success: true };
                    }
                    return { success: false, error: 'Element not found' };
                })()
            `);
            
            panelAction.textContent = hint;
        }
        
        function clickElement(selector) {
            webview.executeJavaScript(`
                (function() {
                    const el = document.querySelector('${selector}');
                    if (el) {
                        el.click();
                        return { success: true };
                    }
                    return { success: false, error: 'Element not found' };
                })()
            `);
        }
        
        document.getElementById('back-btn').addEventListener('click', () => {
            webview.goBack();
        });
        
        document.getElementById('forward-btn').addEventListener('click', () => {
            webview.goForward();
        });
        
        document.getElementById('refresh-btn').addEventListener('click', () => {
            webview.reload();
            if (autoMode) {
                setTimeout(captureAndAnalyze, 2000);
            }
        });
        
        document.getElementById('go-btn').addEventListener('click', () => {
            let url = urlBar.value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            webview.src = url;
        });
        
        urlBar.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('go-btn').click();
            }
        });
        
        webview.addEventListener('did-navigate', (e) => {
            urlBar.value = e.payload.url;
            if (autoMode && e.payload.url !== lastUrl) {
                lastUrl = e.payload.url;
                setTimeout(captureAndAnalyze, 1500);
            }
        });
        
        webview.addEventListener('did-navigate-in-page', (e) => {
            if (autoMode && e.payload.url !== lastUrl) {
                lastUrl = e.payload.url;
                setTimeout(captureAndAnalyze, 1000);
            }
        });
        
        setTimeout(() => {
            statusIndicator.textContent = '已就绪';
            statusIndicator.classList.add('connected');
        }, 1000);
    </script>
</body>
</html>
